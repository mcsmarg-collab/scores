<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sports Wall Pro — Portrait Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#07090d;--panel:#121722;--ink:#f6f1e7;--muted:#a9a49a;--gold:#f0bd3d;--red:#e7474d;--green:#4dc275;
  --a:#f0bd3d;--b:#2f7dff;--logoA:transparent;--logoB:transparent;
}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--ink);font-family:Archivo,system-ui,sans-serif}
/* Rotate whole website for a TV mounted vertically. Change rotate(90deg) to rotate(-90deg) if upside down. */
.rotator{position:fixed;left:50%;top:50%;width:100vh;height:100vw;transform:translate(-50%,-50%) rotate(90deg);transform-origin:center;overflow:hidden;background:var(--void)}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:#07090d;isolation:isolate}
.bg{position:absolute;inset:-8%;z-index:0;overflow:hidden;background:
  radial-gradient(circle at var(--x1,22%) var(--y1,24%), color-mix(in srgb,var(--a),transparent 35%) 0 9%, transparent 33%),
  radial-gradient(circle at var(--x2,78%) var(--y2,70%), color-mix(in srgb,var(--b),transparent 30%) 0 8%, transparent 35%),
  linear-gradient(var(--angle,130deg), #05070b, #111827 47%, #05070b);
  animation:bgDrift 18s ease-in-out infinite alternate;filter:saturate(1.25) contrast(1.05)}
@keyframes bgDrift{from{transform:scale(1) translate3d(0,0,0)}to{transform:scale(1.08) translate3d(-2%,1.5%,0)}}
.bg:before,.bg:after{content:"";position:absolute;inset:-20%;pointer-events:none}.bg:before{background:var(--pattern),var(--pattern2);opacity:.68;mix-blend-mode:screen;animation:pan 32s linear infinite}.bg:after{background:radial-gradient(circle at var(--sparkX,50%) var(--sparkY,50%), color-mix(in srgb,var(--gold),transparent 70%) 0 4%, transparent 23%),conic-gradient(from var(--spin,0deg) at 50% 50%, transparent 0 20%, color-mix(in srgb,var(--a),transparent 82%) 24%, transparent 33%, color-mix(in srgb,var(--b),transparent 84%) 46%, transparent 60% 100%),radial-gradient(ellipse at center,transparent 28%,rgba(0,0,0,.72) 76%),linear-gradient(90deg,rgba(255,255,255,.035),transparent 18%,transparent 82%,rgba(255,255,255,.035));animation:slowSpin 26s linear infinite;}@keyframes slowSpin{to{--spin:360deg}}
@keyframes pan{to{transform:translate3d(-7%,4%,0) rotate(.5deg)}}
.logoGhost{position:absolute;inset:0;z-index:0;opacity:.10;background-image:var(--logoA),var(--logoB);background-repeat:no-repeat;background-position:left -7% center,right -7% center;background-size:48% auto,48% auto;filter:blur(1px) grayscale(.15);animation:ghost 12s ease-in-out infinite alternate}@keyframes ghost{to{opacity:.16;transform:scale(1.025)}}
.fx{position:absolute;inset:0;z-index:1;pointer-events:none}.fx span{position:absolute;display:block;border-radius:999px;background:rgba(255,255,255,.55);box-shadow:0 0 22px currentColor;opacity:.5;animation:floatUp var(--d,10s) linear infinite;left:var(--l);top:105%;width:var(--s);height:var(--s);color:var(--c,#fff)}@keyframes floatUp{to{transform:translateY(-125vh) translateX(var(--dx,0));opacity:0}}
.scoreFlash{position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(circle,color-mix(in srgb,var(--a),transparent 25%),transparent 55%);opacity:0}.scoreFlash.on{animation:flash .9s ease}@keyframes flash{0%{opacity:0}30%{opacity:.55}100%{opacity:0}}
.poster{position:absolute;inset:0;z-index:3;display:grid;grid-template-rows:auto 1fr auto;padding:clamp(20px,4vh,44px);gap:clamp(10px,2vh,20px)}
.topBar{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;min-height:92px}.matchFull{font-family:Bebas Neue,Impact,sans-serif;font-size:clamp(30px,6.2vh,72px);letter-spacing:.8px;line-height:.92;text-shadow:0 8px 30px rgba(0,0,0,.65);max-width:83%;text-wrap:balance}.matchFull small{display:block;font:700 clamp(10px,1.35vh,14px)/1 Space Mono,monospace;color:var(--gold);letter-spacing:3px;margin-bottom:7px;text-transform:uppercase}.statusStack{display:grid;gap:8px;justify-items:end}.badge{font:900 clamp(12px,1.6vh,18px)/1 Archivo,sans-serif;padding:9px 12px;border-radius:999px;background:rgba(8,12,18,.74);border:1px solid rgba(255,255,255,.18);box-shadow:0 10px 35px rgba(0,0,0,.34);white-space:nowrap}.badge.live{color:#fff;background:linear-gradient(135deg,#e5223b,#ff7b4f);animation:pulse 1.4s infinite}.badge.upcoming{color:#07100b;background:#73ff9a}.badge.final{color:#111;background:#d5d3ca}.clock{font:700 12px Space Mono,monospace;color:rgba(246,241,231,.72);background:rgba(0,0,0,.32);padding:7px 10px;border-radius:999px;white-space:nowrap}@keyframes pulse{50%{transform:scale(1.045);box-shadow:0 0 24px rgba(231,71,77,.55)}}
.hero{min-height:0;display:grid;grid-template-rows:auto 1fr auto;align-items:center;gap:10px}.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(10px,3vw,36px)}.team{min-width:0;display:grid;gap:10px;align-items:center;justify-items:center;text-align:center}.logoWrap{position:relative;width:clamp(110px,22vh,260px);height:clamp(110px,22vh,260px);display:grid;place-items:center}.teamLogo{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 16px 24px rgba(0,0,0,.55));position:relative;z-index:2}.logoFallback{position:absolute;inset:6%;display:grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,var(--tc),rgba(255,255,255,.10));border:2px solid rgba(255,255,255,.26);font:900 clamp(20px,5.5vh,64px) Archivo,sans-serif;color:white;text-shadow:0 6px 20px rgba(0,0,0,.7);box-shadow:0 18px 45px rgba(0,0,0,.38)}.teamLogo[src=""],.teamLogo.broken{display:none}.teamName{font:900 clamp(24px,3.8vh,52px)/.9 Archivo,sans-serif;text-transform:uppercase;letter-spacing:.6px;text-shadow:0 8px 24px rgba(0,0,0,.65);max-width:100%;overflow:hidden;text-overflow:ellipsis}.teamRec{font:700 clamp(10px,1.3vh,14px) Space Mono,monospace;color:rgba(246,241,231,.68)}.scoreBox{display:grid;place-items:center;gap:8px;width:100%}.score{font:900 clamp(56px,14.5vh,180px)/.82 Oswald,Impact,sans-serif;letter-spacing:-3px;text-shadow:0 0 42px rgba(0,0,0,.8)}.scorePair{display:grid;grid-template-columns:minmax(120px,1fr) auto minmax(120px,1fr);gap:14px;align-items:stretch;width:min(92vw,620px)}.scoreTeam{text-align:center;border-radius:24px;padding:12px 14px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,.28));border:2px solid color-mix(in srgb,var(--teamScoreColor),white 22%);box-shadow:0 16px 48px rgba(0,0,0,.36), inset 0 0 32px color-mix(in srgb,var(--teamScoreColor),transparent 78%)}.scoreLabel{font:900 clamp(15px,2.25vh,28px) Archivo,sans-serif;color:#fff;letter-spacing:.8px;margin-bottom:8px;text-transform:uppercase;text-shadow:0 5px 18px rgba(0,0,0,.7)}.scoreSub{font:900 clamp(11px,1.5vh,17px) Space Mono,monospace;color:var(--gold);margin-top:5px;letter-spacing:1px;text-transform:uppercase}.score.sep{align-self:center;font-size:clamp(24px,6vh,70px);letter-spacing:0;color:rgba(246,241,231,.55)}.centerMeta{text-align:center;font:800 clamp(11px,1.65vh,19px)/1.25 Space Mono,monospace;color:rgba(246,241,231,.9);text-transform:uppercase;letter-spacing:1.6px}.countdown{color:var(--gold)}
.infoGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-width:0}.card{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:12px;min-width:0;box-shadow:0 14px 35px rgba(0,0,0,.18);backdrop-filter:blur(8px)}.card b{display:block;font:800 10px Space Mono,monospace;color:var(--gold);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:4px}.card span{font:700 clamp(11px,1.45vh,15px) Archivo,sans-serif;color:rgba(246,241,231,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}.bottom{display:grid;gap:9px}.statsDock{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:10px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:10px 12px;min-height:58px}.statsTitle{font:900 12px Space Mono,monospace;color:#080a0d;background:var(--gold);border-radius:999px;padding:8px 10px;white-space:nowrap}.statsScroller{overflow:hidden;white-space:nowrap}.statsText{display:inline-block;font:800 clamp(12px,1.7vh,18px) Archivo,sans-serif;animation:ticker 70s linear infinite}.statsText span{margin-right:34px}.ticker{height:34px;background:#05070b;border-top:1px solid rgba(255,255,255,.16);border-bottom:1px solid rgba(255,255,255,.16);display:flex;align-items:center;overflow:hidden;margin-inline:-44px}.tickerTrack{white-space:nowrap;font:800 13px Space Mono,monospace;color:rgba(246,241,231,.88);animation:ticker 110s linear infinite}.tickerTrack span{margin-right:42px}.tickerTrack b{color:var(--gold)}@keyframes ticker{to{transform:translateX(-50%)}}
.dots{display:none}.slideCounter{display:none}
.controls{position:absolute;z-index:30;top:14px;left:14px;display:flex;gap:8px}.btn{font:800 12px Archivo,sans-serif;background:rgba(10,13,18,.7);color:#eee;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:9px 12px;cursor:pointer;backdrop-filter:blur(6px)}body.kiosk .controls,body.kiosk .dots{opacity:0;pointer-events:none}.toast{position:absolute;z-index:50;left:50%;bottom:70px;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:10px 14px;font:700 13px Archivo,sans-serif}.overlay{position:absolute;inset:0;z-index:80;background:rgba(0,0,0,.78);display:grid;place-items:center}.panel{width:min(760px,92%);max-height:86%;overflow:auto;background:#111827;border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:20px}.panel h2{margin:0 0 8px;font:42px Bebas Neue;color:var(--gold);letter-spacing:1px}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.chip{border:1px solid rgba(255,255,255,.18);border-radius:999px;background:transparent;color:#ddd;padding:8px 12px;font-weight:800}.chip.on{background:var(--gold);color:#111}.gameRow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;margin:7px 0}.gameRow strong{display:block}.gameRow small{color:#aaa}.add{background:var(--gold);border:0;border-radius:9px;padding:8px 12px;font-weight:900}.add.remove{background:#e7474d;color:white}.section{margin-top:14px;color:#aaa;font:800 11px Space Mono,monospace;letter-spacing:2px;text-transform:uppercase}
/* 20 very different layout skins */
.skin-0 .poster{background:linear-gradient(90deg,rgba(0,0,0,.28),transparent)}.skin-0 .score{color:#fff}.skin-0 .card{border-radius:4px}.skin-1 .bg:before{filter:contrast(1.3)}.skin-1 .teamLogo{border-radius:50%;background:rgba(255,255,255,.08);padding:12px}.skin-1 .score{color:var(--gold)}.skin-2 .poster{border:16px solid rgba(240,189,61,.48)}.skin-2 .card,.skin-2 .statsDock{border-style:dashed}.skin-3 .bg{filter:hue-rotate(18deg) saturate(1.5)}.skin-3 .score{text-shadow:6px 6px 0 rgba(0,0,0,.35),0 0 35px var(--a)}.skin-4 .poster{background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 2px,transparent 2px 8px)}.skin-4 .teamName,.skin-4 .matchFull{font-family:Space Mono,monospace}.skin-5 .card{background:rgba(246,241,231,.88);color:#111}.skin-5 .card span{color:#111}.skin-5 .score{color:#f5f5f5}.skin-6 .poster{box-shadow:inset 0 0 0 10px rgba(255,255,255,.12),inset 0 0 0 20px rgba(0,0,0,.25)}.skin-7 .teamLogo{transform:rotate(-3deg)}.skin-7 .team:nth-child(3) .teamLogo{transform:rotate(3deg)}.skin-8 .score{font-family:Bebas Neue}.skin-8 .card{transform:skew(-4deg)}.skin-9 .bg:after{background:linear-gradient(180deg,rgba(255,255,255,.12),transparent 18%,rgba(0,0,0,.65)),radial-gradient(ellipse at center,transparent 35%,#000 83%)}.skin-10 .poster{background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 30%,rgba(255,255,255,.08))}.skin-11 .matchFull{text-align:center;max-width:100%}.skin-11 .topBar{grid-template-columns:1fr}.skin-11 .statusStack{position:absolute;right:44px;top:44px}.skin-12 .card,.skin-12 .statsDock{box-shadow:0 0 22px color-mix(in srgb,var(--a),transparent 65%)}.skin-13 .bg{background:linear-gradient(180deg,#111,#050505)}.skin-13 .bg:before{background:repeating-linear-gradient(90deg,rgba(240,189,61,.16) 0 1px,transparent 1px 60px),repeating-linear-gradient(0deg,rgba(240,189,61,.10) 0 1px,transparent 1px 60px)}.skin-14 .team{background:rgba(0,0,0,.28);border-radius:28px;padding:14px}.skin-15 .poster{filter:contrast(1.08)}.skin-15 .badge{border-radius:2px}.skin-16 .scoreBox{background:rgba(0,0,0,.33);border-radius:36px;padding:18px}.skin-17 .matchFull{color:var(--gold)}.skin-17 .teamName{color:#fff}.skin-18 .card{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.03));border-radius:30px}.skin-19 .poster{background:radial-gradient(circle at 50% 50%,transparent 0 35%,rgba(0,0,0,.3) 36% 100%)}
@media(max-height:640px){.infoGrid{grid-template-columns:repeat(2,1fr)}.card:nth-child(n+3){display:none}.matchFull{font-size:clamp(28px,5vh,48px)}.topBar{min-height:72px}.logoWrap{width:clamp(86px,16vh,170px);height:clamp(86px,16vh,170px)}}


/* ---- V3 Fire TV performance + safe-fit overrides ----
   This version is intentionally lighter so Silk/Fire Stick does not lag, and
   everything stays inside the rotated portrait screen. */
.rotator{background:#05070b;}
.stage{contain:layout paint style;}
.bg{inset:0;filter:none !important;animation:bgDrift 46s ease-in-out infinite alternate !important;opacity:.95;}
@keyframes bgDrift{from{transform:scale(1)}to{transform:scale(1.025)}}
.bg:before{opacity:.34 !important;animation:pan 90s linear infinite !important;}
.bg:after{opacity:.55;animation:none !important;background:
  radial-gradient(circle at var(--sparkX,50%) var(--sparkY,50%), color-mix(in srgb,var(--gold),transparent 78%) 0 7%, transparent 28%),
  radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.76) 82%),
  linear-gradient(90deg,rgba(255,255,255,.03),transparent 20%,transparent 80%,rgba(255,255,255,.03));}
.logoGhost{opacity:.07;filter:none;animation:none;background-size:40% auto,40% auto;}
.fx{display:none !important;}
.poster{inset:0;transform:scale(.88);transform-origin:center;grid-template-rows:clamp(86px,15%,132px) minmax(0,1fr) clamp(120px,20%,180px);padding:clamp(12px,2.2vh,24px);gap:clamp(6px,1.1vh,12px);}
.topBar{min-height:0;align-items:start;grid-template-columns:minmax(0,1fr) auto;gap:10px;}
.matchFull{max-width:none;font-size:clamp(22px,4.5vh,46px);line-height:.95;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-wrap:balance;}
.matchFull small{font-size:clamp(8px,1.05vh,12px);margin-bottom:5px;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.statusStack{gap:5px}.badge{font-size:clamp(10px,1.25vh,14px);padding:7px 10px}.clock{font-size:10px;padding:6px 8px;}
.hero{grid-template-rows:auto minmax(0,1fr) auto;gap:7px;min-height:0;overflow:hidden;}
.centerMeta{font-size:clamp(9px,1.25vh,14px);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.teams{min-height:0;grid-template-columns:minmax(0,1fr) minmax(210px,42%,430px) minmax(0,1fr);gap:clamp(6px,1.2vw,16px);align-items:center;}
.team{gap:5px;min-width:0;overflow:hidden;}
.logoWrap{width:clamp(72px,14vh,145px);height:clamp(72px,14vh,145px);}
.logoFallback{font-size:clamp(18px,3.7vh,42px);}
.teamName{font-size:clamp(15px,2.25vh,28px);line-height:.95;max-width:100%;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal;}
.teamRec{font-size:clamp(8px,1.05vh,12px);}
.scoreBox{min-width:0}.scorePair{width:100%;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:7px;}
.scoreTeam{border-radius:16px;padding:8px 6px;min-width:0;}
.scoreLabel{font-size:clamp(10px,1.5vh,18px);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score{font-size:clamp(38px,9.5vh,100px);letter-spacing:-1px;}
.score.sep{font-size:clamp(18px,4vh,40px);}
.scoreSub{font-size:clamp(8px,1.05vh,11px);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.countdown{font-size:clamp(26px,6vh,58px);white-space:normal;text-align:center;}
.infoGrid{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;}
.card{border-radius:12px;padding:8px;backdrop-filter:none !important;}
.card b{font-size:8px;margin-bottom:2px;letter-spacing:1px;}.card span{font-size:clamp(9px,1.15vh,12px);}
.bottom{gap:6px;min-height:0;overflow:hidden;}
.statsDock{grid-template-columns:auto minmax(0,1fr);min-height:44px;border-radius:14px;padding:7px 9px;}
.statsTitle{font-size:9px;padding:6px 8px;}.statsText{font-size:clamp(10px,1.3vh,14px);animation:ticker 140s linear infinite;}
.statsText span{margin-right:26px;}.ticker{height:26px;margin-inline:0;border-radius:10px;}.tickerTrack{font-size:10px;animation:ticker 180s linear infinite;}.tickerTrack span{margin-right:30px;}
.controls{transform:scale(.85);transform-origin:top left;}
@media (max-height:700px), (max-width:700px){.poster{transform:scale(.82)}.infoGrid{grid-template-columns:repeat(2,minmax(0,1fr));}.logoWrap{width:clamp(58px,12vh,110px);height:clamp(58px,12vh,110px)}.score{font-size:clamp(30px,8vh,76px)}}
@media (prefers-reduced-motion: reduce){*,*:before,*:after{animation:none!important;transition:none!important}}


/* ---- V4 fit + clean stats overrides ---- */
.poster{transform:none !important;grid-template-rows:clamp(100px,15%,145px) minmax(0,1fr) clamp(150px,24%,215px) !important;padding:clamp(16px,2.6vh,30px) !important;gap:clamp(8px,1.4vh,14px) !important;}
.matchFull{font-size:clamp(26px,5.1vh,56px) !important;line-height:.9 !important;-webkit-line-clamp:2;}
.hero{gap:clamp(7px,1.2vh,12px) !important;}
.teams{grid-template-columns:minmax(0,1fr) minmax(250px,46%,520px) minmax(0,1fr) !important;gap:clamp(8px,1.7vw,22px) !important;}
.logoWrap{width:clamp(90px,17.5vh,190px) !important;height:clamp(90px,17.5vh,190px) !important;}
.teamName{font-size:clamp(19px,2.9vh,36px) !important;line-height:.9 !important;}
.teamRec{display:none !important;}
.scorePair{width:100% !important;gap:8px !important;}
.scoreTeam{border-radius:18px !important;padding:10px 8px !important;}
.scoreLabel{font-size:clamp(13px,1.9vh,22px) !important;margin-bottom:5px !important;}
.score{font-size:clamp(46px,10.8vh,118px) !important;line-height:.8 !important;}
.score.sep{font-size:clamp(18px,4.2vh,44px) !important;}
.infoGrid{gap:7px !important;}
.card{padding:9px !important;}
.bottom{gap:0 !important;}
.ticker{display:none !important;}
.statsDock{display:grid !important;grid-template-columns:1fr 1fr !important;gap:10px !important;min-height:0 !important;height:100% !important;border-radius:18px !important;padding:10px !important;overflow:hidden !important;}
.teamStatsCard{min-width:0;border-radius:16px;padding:10px 12px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.30));border:1px solid color-mix(in srgb,var(--teamColor),white 18%);box-shadow:inset 0 0 28px color-mix(in srgb,var(--teamColor),transparent 80%);display:grid;grid-template-rows:auto 1fr;gap:7px;overflow:hidden;}
.teamStatsHeader{display:flex;align-items:center;justify-content:space-between;gap:8px;font:900 clamp(11px,1.55vh,16px) Archivo,sans-serif;text-transform:uppercase;letter-spacing:.7px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.teamStatsHeader b{color:var(--gold);font:900 clamp(9px,1.2vh,12px) Space Mono,monospace;letter-spacing:1.3px;}
.teamStatsList{display:grid;gap:5px;align-content:start;overflow:hidden;}

        mlb:[['Runs',['runs','r']],['Hits',['hits','h']],['Errors',['errors','e']],['Left On Base',['leftonbase','lob']]],
        nba:[['FG %',['fieldgoalpct','fg%','fieldgoals%','fieldgoalpercentage']],['Rebounds',['rebounds','reb']],['Assists',['assists','ast']],['Turnovers',['turnovers','to']]],
        wnba:[['FG %',['fieldgoalpct','fg%','fieldgoals%','fieldgoalpercentage']],['Rebounds',['rebounds','reb']],['Assists',['assists','ast']],['Turnovers',['turnovers','to']]],
        nfl:[['Total Yards',['totalyards','totyds','totalyds']],['Passing Yards',['passingyards','passyds']],['Rushing Yards',['rushingyards','rushyds']],['Turnovers',['turnovers','to']]],
        ncaaf:[['Total Yards',['totalyards','totyds','totalyds']],['Passing Yards',['passingyards','passyds']],['Rushing Yards',['rushingyards','rushyds']],['Turnovers',['turnovers','to']]],
        nhl:[['Shots',['shots','shotstotal']],['Faceoff %',['faceoffpercent','faceoff%','faceoffpct']],['Power Plays',['powerplaygoals','powerplays']],['Penalty Minutes',['penaltyminutes','pim']]],
        mls:[['Possession',['possession','possessionpct','possession%']],['Shots',['shots']],['Shots On Goal',['shotsongoal','sog']],['Corners',['corners','cornerkicks']]],
        epl:[['Possession',['possession','possessionpct','possession%']],['Shots',['shots']],['Shots On Goal',['shotsongoal','sog']],['Corners',['corners','cornerkicks']]],
        wc:[['Possession',['possession','possessionpct','possession%']],['Shots',['shots']],['Shots On Goal',['shotsongoal','sog']],['Corners',['corners','cornerkicks']]],
        ncaam:[['FG %',['fieldgoalpct','fg%','fieldgoals%','fieldgoalpercentage']],['Rebounds',['rebounds','reb']],['Assists',['assists','ast']],['Turnovers',['turnovers','to']]]
      }[g.league]||[];
      let used=new Set();
      want.forEach(([nice,keys],i)=>{
        for(const k of keys){
          let hit=Object.entries(m).find(([mk])=>mk===k||mk.includes(k));
          if(hit&&!used.has(hit[0])){used.add(hit[0]);add(teamAbbr,nice,hit[1].value,i);return;}
        }
      });
    }
    if(j.boxscore&&Array.isArray(j.boxscore.teams)){
      j.boxscore.teams.forEach(t=>pickStats(abbrOf(t.team),t.statistics||t.stats));
    }
    if(comp&&Array.isArray(comp.competitors)){
      comp.competitors.forEach(c=>pickStats(abbrOf(c.team),c.statistics||c.stats));
    }
    function addLeader(team,label,top,priority){
      if(!top) return;
      const player=top.athlete&&(top.athlete.shortName||top.athlete.displayName)||top.displayName||top.name;
      const val=top.displayValue||top.value||top.summary;
      if(good(player)&&good(val)) add(team,label,`${player} · ${val}`,priority);
    }
    (j.leaders||[]).forEach(tb=>{
      const ab=abbrOf(tb.team);
      (tb.leaders||[]).forEach((cat,ci)=>addLeader(ab,cat.shortDisplayName||cat.displayName||cat.name,(cat.leaders||[])[0],10+ci));
    });
    if(j.boxscore&&Array.isArray(j.boxscore.players)){
      j.boxscore.players.forEach(p=>{
        const ab=abbrOf(p.team);
        (p.statistics||[]).forEach(group=>{
          (group.leaders||[]).slice(0,2).forEach((top,i)=>addLeader(ab,group.shortDisplayName||group.displayName||group.name,top,18+i));
        });
      });
    }
    Object.keys(packet.teams).forEach(ab=>{
      packet.teams[ab].sort((x,y)=>x.priority-y.priority);
      packet.teams[ab]=packet.teams[ab].slice(0,4);
    });
  }catch(e){
    console.warn('summary stats failed',e);
  }
  leaderCache[key]=packet;
}
function statValue(v){return (v===undefined||v===null||v===''||v==='--'||v==='—')?'Not posted':String(v)}
function friendlyStatLabel(label,league){
  let raw=String(label||'Top Stat').trim();
  let k=raw.toLowerCase().replace(/[^a-z0-9%]+/g,'');
  const map={
    pts:'Points', points:'Points', reb:'Rebounds', rebounds:'Rebounds', ast:'Assists', assists:'Assists', stl:'Steals', blk:'Blocks',
    hr:'Home Runs', homeruns:'Home Runs', rbi:'RBIs', rbis:'RBIs', r:'Runs', runs:'Runs', h:'Hits', hits:'Hits', avg:'Batting Avg', era:'ERA', so:'Strikeouts', k:'Strikeouts',
    totalyards:'Total Yards', passingyards:'Passing Yards', rushingyards:'Rushing Yards', turnovers:'Turnovers', firstdowns:'First Downs',
    pass:'Passing', passing:'Passing', rush:'Rushing', rushing:'Rushing', rec:'Receiving', receiving:'Receiving', yds:'Yards', yards:'Yards',
    goals:'Goals', gls:'Goals', shots:'Shots', shotsongoal:'Shots On Goal', sog:'Shots On Goal', saves:'Saves', possession:'Possession', corners:'Corners', cornerkicks:'Corners',
    fieldgoalpct:'FG %', fieldgoalpercentage:'FG %', fg:'FG %', 'fg%':'FG %', faceoffpercent:'Faceoff %', faceoffpct:'Faceoff %'
  };
  if(map[k]) return map[k];
  return raw.replace(/\bHR\b/i,'Home Runs').replace(/\bRBI\b/i,'RBIs').replace(/\bPTS\b/i,'Points').replace(/\bREB\b/i,'Rebounds').replace(/\bAST\b/i,'Assists').replace(/\bSOG\b/i,'Shots On Goal');
}
function leadersForTeam(g,team){
  const packet=leaderCache[g.league+'-'+g.id];
  if(packet && packet.teams && packet.teams[team.abbr]) return packet.teams[team.abbr];
  return [];
}
function teamStatsHTML(g,side){
  const team=g[side];
  const lines=leadersForTeam(g,team).filter(x=>x.label&&x.value);
  const body=lines.length
    ? lines.map(x=>`<div class="statLine"><span>${esc(x.label)}</span><span>${esc(x.value)}</span></div>`).join('')
    : `<div class="statLine empty"><span>Game stats</span><span>ESPN has not posted them yet</span></div>`;
  return `<div class="teamStatsCard" style="--teamColor:${team.color}"><div class="teamStatsHeader"><span>${esc(team.short)}</span><b>${side==='away'?'AWAY':'HOME'}</b></div><div class="teamStatsList">${body}</div></div>`;
}
function matchupStatsHTML(g){return teamStatsHTML(g,'away')+teamStatsHTML(g,'home')}
function timeStr(d){return new Date(d).toLocaleString([], {weekday:'short',hour:'numeric',minute:'2-digit'})}function countdown(d){let ms=new Date(d)-Date.now();if(ms<=0)return '';let h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);return `STARTS IN ${h}H ${m}M`}
function makeFx(skin){ fx.innerHTML=''; /* particles disabled for Fire TV performance */ }
function render(){fallbackSelect();if(!selected.length){poster.innerHTML='<div style="place-self:center;text-align:center"><h1 style="font:72px Bebas Neue;color:var(--gold)">NO GAMES FOUND</h1><p>Open Manage Games after games load.</p></div>';return}let sel=selected[idx%selected.length],g=find(sel.league,sel.id);if(!g){idx=(idx+1)%selected.length;return render()}let scoreKey=g.league+'-'+g.id,score=(g.away.score||'')+'-'+(g.home.score||'');if(lastScores[scoreKey]&&lastScores[scoreKey]!==score){flash.classList.remove('on');void flash.offsetWidth;flash.classList.add('on')}lastScores[scoreKey]=score;fetchLeaders(g).then(()=>{let e=document.querySelector('.statsDock');if(e&&selected[idx%selected.length]===sel)e.innerHTML=matchupStatsHTML(g)});
let skin=sel.skin??Math.floor(Math.random()*20),pat=sel.pattern??Math.floor(Math.random()*PATTERNS.length),a=g.away.color,b=g.home.color;stage.className='stage skin-'+skin;stage.style.setProperty('--a',a);stage.style.setProperty('--b',b);stage.style.setProperty('--gold',LEAGUES[g.league].accent);stage.style.setProperty('--logoA',g.away.logo?`url("${g.away.logo}")`:'none');stage.style.setProperty('--logoB',g.home.logo?`url("${g.home.logo}")`:'none');bg.style.setProperty('--pattern',PATTERNS[pat]);bg.style.setProperty('--pattern2',PATTERNS[(pat+7)%PATTERNS.length]);bg.style.setProperty('--sparkX',(20+Math.floor(Math.random()*60))+'%');bg.style.setProperty('--sparkY',(15+Math.floor(Math.random()*70))+'%');bg.style.setProperty('--angle',(80+Math.floor(sel.seed*220))+'deg');bg.style.setProperty('--x1',(10+Math.floor(sel.seed*50))+'%');bg.style.setProperty('--y1',(10+Math.floor((1-sel.seed)*45))+'%');bg.style.setProperty('--x2',(55+Math.floor((1-sel.seed)*35))+'%');bg.style.setProperty('--y2',(48+Math.floor(sel.seed*35))+'%');makeFx(skin);
let status=g.state==='in'?'LIVE':g.state==='post'?'FINAL':'UPCOMING',cls=g.state==='in'?'live':g.state==='post'?'final':'upcoming';let scoreLine=g.state==='pre'?`<div class="score countdown">${countdown(g.date)||timeStr(g.date)}</div>`:`<div class="scorePair"><div class="scoreTeam" style="--teamScoreColor:${a}"><div class="scoreLabel">${esc(g.away.short)}</div><div class="score">${esc(g.away.score??'–')}</div><div class="scoreSub">AWAY · ${esc(g.away.abbr||'')}</div></div><div class="score sep">–</div><div class="scoreTeam" style="--teamScoreColor:${b}"><div class="scoreLabel">${esc(g.home.short)}</div><div class="score">${esc(g.home.score??'–')}</div><div class="scoreSub">HOME · ${esc(g.home.abbr||'')}</div></div></div>`;
poster.innerHTML=`<div class="topBar"><div class="matchFull">${LEAGUES[g.league].emoji} ${LEAGUES[g.league].label} · ${timeStr(g.date)}</div><div class="statusStack"><div class="clock" id="clock"></div></div></div><div class="hero"><div class="gameTitleCenter">${esc(g.away.name)} <span class="vsWord">vs</span> ${esc(g.home.name)}</div><div class="centerMeta">${esc(g.detail)} ${g.clock?' · '+esc(g.clock):''}</div><div class="teams"><div class="team"><div class="logoWrap" style="--tc:${a}"><div class="logoFallback">${esc(g.away.abbr||g.away.short.slice(0,3))}</div><img class="teamLogo" src="${esc(g.away.logo)}" onerror="this.classList.add('broken')"></div><div class="teamName">${esc(g.away.short)}</div></div><div class="scoreBox">${scoreLine}</div><div class="team"><div class="logoWrap" style="--tc:${b}"><div class="logoFallback">${esc(g.home.abbr||g.home.short.slice(0,3))}</div><img class="teamLogo" src="${esc(g.home.logo)}" onerror="this.classList.add('broken')"></div><div class="teamName">${esc(g.home.short)}</div></div></div><div class="infoGrid"><div class="card"><b>Venue</b><span>${esc(g.venue||'Not listed')}</span></div><div class="card"><b>Broadcast</b><span>${esc(g.broadcast||'Not listed')}</span></div><div class="card"><b>Game Time</b><span>${esc(timeStr(g.date))}</span></div><div class="card"><b>Game Info</b><span>${esc(g.detail||status)}</span></div></div></div><div class="bottom"><div class="statsDock">${matchupStatsHTML(g)}</div></div>`;renderDots();updateClock();renderTicker()}
function renderDots(){dots.innerHTML=''}function renderTicker(){let games=allGames().slice(0,25);let text=games.map(g=>`<span><b>${LEAGUES[g.league].label}</b> ${esc(g.away.abbr||g.away.short)}: ${g.away.score??'—'}  |  ${esc(g.home.abbr||g.home.short)}: ${g.home.score??'—'} · ${esc(g.detail||timeStr(g.date))}</span>`).join('');let t=$('tickerTrack');if(t)t.innerHTML=text+text}
function next(){if(!selected.length)return;idx=(idx+1)%selected.length;render()}function reset(){clearInterval(timer);timer=setInterval(()=>{if(!paused)next()},15000)}function updateClock(){let c=$('clock');if(c)c.textContent=new Date().toLocaleString([], {weekday:'short',hour:'numeric',minute:'2-digit',second:'2-digit'})}setInterval(updateClock,1000);
async function refreshAll(){await Promise.all([...active].map(refreshLeague));pruneSelected();fallbackSelect();renderTicker();render()}async function softRefresh(){await Promise.all([...new Set([...active,...selected.map(s=>s.league)])].map(refreshLeague));pruneSelected();renderTicker();render()}
$('pauseBtn').onclick=()=>{paused=!paused;$('pauseBtn').textContent=paused?'Play':'Pause'};$('fsBtn').onclick=()=>{let el=document.documentElement;(el.requestFullscreen||el.webkitRequestFullscreen||(()=>Promise.reject())).call(el).catch(()=>toast('Fullscreen blocked. Press full screen in Silk if available.'));document.body.classList.add('kiosk');setTimeout(()=>document.body.classList.remove('kiosk'),5000)};function toast(m){let x=document.createElement('div');x.className='toast';x.textContent=m;stage.appendChild(x);setTimeout(()=>x.remove(),3000)}
$('manageBtn').onclick=()=>openManage();function openManage(){paused=true;let o=document.createElement('div');o.className='overlay';stage.appendChild(o);function draw(){let games=allGames();let allOn=games.length&&games.every(g=>selected.some(s=>s.league===g.league&&s.id===g.id));o.innerHTML=`<div class="panel"><h2>Manage Games</h2><div style="color:#aaa">Choose what appears in the rotation. Current filter: ${gameWindow==='live'?'LIVE GAMES ONLY':'LIVE + FINALS FROM LAST 2 HOURS'}.</div><div class="chips windowChips"><button class="chip ${gameWindow==='live2h'?'on':''}" data-window="live2h">Live + Last 2h</button><button class="chip ${gameWindow==='live'?'on':''}" data-window="live">Live Only</button></div><div class="chips">${Object.entries(LEAGUES).map(([k,l])=>`<button class="chip ${active.has(k)?'on':''}" data-l="${k}">${l.emoji} ${l.label}</button>`).join('')}</div><div class="section">Available Games</div><div style="display:flex;gap:10px;margin:8px 0 12px"><button class="btn" id="selectAllBtn">${allOn?'Remove All Available':'Select All Available'}</button><button class="btn" id="clearBtn">Clear Rotation</button></div>${games.map(g=>{let on=selected.some(s=>s.league===g.league&&s.id===g.id);let tag=g.state==='in'?'LIVE':'FINAL · LAST 2H';return `<div class="gameRow"><div><strong>${esc(g.away.name)} @ ${esc(g.home.name)}</strong><small>${LEAGUES[g.league].label} · ${tag} · ${esc(g.detail||timeStr(g.date))}</small></div><button class="add ${on?'remove':''}" data-g="${g.league}|${g.id}">${on?'Remove':'Add'}</button></div>`}).join('')||'<p>No games match this filter right now.</p>'}<div class="section">In Rotation: ${selected.length}</div><button class="btn" id="doneBtn">Done</button></div>`;o.querySelectorAll('[data-window]').forEach(b=>b.onclick=()=>{gameWindow=b.dataset.window;localStorage.setItem('sportswall-window',gameWindow);pruneSelected();draw()});o.querySelectorAll('.chip[data-l]').forEach(b=>b.onclick=async()=>{let k=b.dataset.l;if(active.has(k))active.delete(k);else{active.add(k);await refreshLeague(k)}pruneSelected();draw()});o.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{let [l,id]=b.dataset.g.split('|'),p=selected.findIndex(s=>s.league===l&&s.id===id);if(p>=0)selected.splice(p,1);else{let g=find(l,id);if(g)selected.push(makeSelection(g))}draw()});o.querySelector('#selectAllBtn').onclick=()=>{if(allOn){selected=selected.filter(s=>!games.some(g=>g.league===s.league&&g.id===s.id))}else{games.forEach(g=>{if(!selected.some(s=>s.league===g.league&&s.id===g.id))selected.push(makeSelection(g))})}draw()};o.querySelector('#clearBtn').onclick=()=>{selected=[];draw()};o.querySelector('#doneBtn').onclick=()=>{o.remove();paused=false;idx=0;pruneSelected();render();reset()}}draw()}
window.addEventListener('click',()=>{if(document.body.classList.contains('kiosk')){document.body.classList.remove('kiosk');setTimeout(()=>document.body.classList.add('kiosk'),5000)}},true);
(async()=>{try{let s=JSON.parse(localStorage.getItem('sportswall-selected')||'[]');if(s.length)selected=s;idx=parseInt(localStorage.getItem('sportswall-idx')||'0')||0}catch(e){}await refreshAll();reset();setInterval(softRefresh,45000);setInterval(()=>{try{localStorage.setItem('sportswall-selected',JSON.stringify(selected));localStorage.setItem('sportswall-idx',String(idx))}catch(e){}},5000);})();
